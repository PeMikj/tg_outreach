services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${TG_OUTREACH_POSTGRES_DB:-tg_outreach}
      POSTGRES_USER: ${TG_OUTREACH_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${TG_OUTREACH_POSTGRES_PASSWORD:-postgres}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TG_OUTREACH_POSTGRES_USER:-postgres} -d ${TG_OUTREACH_POSTGRES_DB:-tg_outreach}"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

  outreach-api:
    build:
      context: ./services/outreach-api
      args:
        TG_OUTREACH_BUILD_VERSION: ${TG_OUTREACH_BUILD_VERSION:-dev}
        TG_OUTREACH_GIT_SHA: ${TG_OUTREACH_GIT_SHA:-unknown}
    ports:
      - "18100:8100"
    environment:
      TG_OUTREACH_ASTRIXA_BASE_URL: ${TG_OUTREACH_ASTRIXA_BASE_URL:-http://api-gateway:8080}
      TG_OUTREACH_ASTRIXA_MODEL: ${TG_OUTREACH_ASTRIXA_MODEL:-mock-1}
      TG_OUTREACH_ASTRIXA_TOKEN: ${ASTRIXA_GATEWAY_TOKEN:-astrixa-dev-token}
      TG_OUTREACH_DATABASE_URL: ${TG_OUTREACH_DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/tg_outreach}
      TG_OUTREACH_BUILD_VERSION: ${TG_OUTREACH_BUILD_VERSION:-dev}
      TG_OUTREACH_GIT_SHA: ${TG_OUTREACH_GIT_SHA:-unknown}
      TG_OUTREACH_PROFILE_PATH: ${TG_OUTREACH_PROFILE_PATH:-/app/config/candidate_profile.json}
      TG_OUTREACH_PREFERENCES_PATH: ${TG_OUTREACH_PREFERENCES_PATH:-/app/config/candidate_preferences.json}
      TG_OUTREACH_USER_HEADLINE: ${TG_OUTREACH_USER_HEADLINE:-Senior Python/ML engineer focused on backend systems and MLOps}
      TG_OUTREACH_USER_SKILLS: ${TG_OUTREACH_USER_SKILLS:-python,fastapi,backend,mlops,llm,infra,docker,postgresql,observability}
      TG_OUTREACH_MIN_SCORE: ${TG_OUTREACH_MIN_SCORE:-0.20}
      TG_OUTREACH_MAX_DAILY_OUTREACH: ${TG_OUTREACH_MAX_DAILY_OUTREACH:-3}
      TG_OUTREACH_ASTRIXA_TIMEOUT_SECONDS: ${TG_OUTREACH_ASTRIXA_TIMEOUT_SECONDS:-8}
      TG_OUTREACH_CONTEXT_BUDGET_TOKENS: ${TG_OUTREACH_CONTEXT_BUDGET_TOKENS:-3000}
      TG_OUTREACH_APPROVAL_TTL_SECONDS: ${TG_OUTREACH_APPROVAL_TTL_SECONDS:-86400}
      TG_OUTREACH_FOLLOW_UP_DELAY_SECONDS: ${TG_OUTREACH_FOLLOW_UP_DELAY_SECONDS:-259200}
      TG_OUTREACH_WORKER_POLL_SECONDS: ${TG_OUTREACH_WORKER_POLL_SECONDS:-15}
      TG_OUTREACH_TELEGRAM_REPLY_POLL_INTERVAL_SECONDS: ${TG_OUTREACH_TELEGRAM_REPLY_POLL_INTERVAL_SECONDS:-300}
      TG_OUTREACH_TELEGRAM_API_ID: ${TG_OUTREACH_TELEGRAM_API_ID:-}
      TG_OUTREACH_TELEGRAM_API_HASH: ${TG_OUTREACH_TELEGRAM_API_HASH:-}
      TG_OUTREACH_TELEGRAM_SESSION_STRING: ${TG_OUTREACH_TELEGRAM_SESSION_STRING:-}
      TG_OUTREACH_TELEGRAM_CHANNELS: ${TG_OUTREACH_TELEGRAM_CHANNELS:-t.me/hrlunapark,t.me/yuniorapp,t.me/dev_connectablejobs}
      TG_OUTREACH_SMTP_HOST: ${TG_OUTREACH_SMTP_HOST:-}
      TG_OUTREACH_SMTP_PORT: ${TG_OUTREACH_SMTP_PORT:-587}
      TG_OUTREACH_SMTP_USERNAME: ${TG_OUTREACH_SMTP_USERNAME:-}
      TG_OUTREACH_SMTP_PASSWORD: ${TG_OUTREACH_SMTP_PASSWORD:-}
      TG_OUTREACH_SMTP_FROM_EMAIL: ${TG_OUTREACH_SMTP_FROM_EMAIL:-}
      TG_OUTREACH_SMTP_STARTTLS: ${TG_OUTREACH_SMTP_STARTTLS:-true}
      TG_OUTREACH_NOTIFY_TARGET: ${TG_OUTREACH_NOTIFY_TARGET:-}
      TG_OUTREACH_DISPATCH_MODE: ${TG_OUTREACH_DISPATCH_MODE:-dry_run}
    volumes:
      - ./data/outreach-api:/data
      - ./config:/app/config:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - default
      - astrixa_net

  outreach-worker:
    build:
      context: ./services/outreach-api
      args:
        TG_OUTREACH_BUILD_VERSION: ${TG_OUTREACH_BUILD_VERSION:-dev}
        TG_OUTREACH_GIT_SHA: ${TG_OUTREACH_GIT_SHA:-unknown}
    command: ["python", "-m", "app.worker"]
    environment:
      TG_OUTREACH_ASTRIXA_BASE_URL: ${TG_OUTREACH_ASTRIXA_BASE_URL:-http://api-gateway:8080}
      TG_OUTREACH_ASTRIXA_MODEL: ${TG_OUTREACH_ASTRIXA_MODEL:-mock-1}
      TG_OUTREACH_ASTRIXA_TOKEN: ${ASTRIXA_GATEWAY_TOKEN:-astrixa-dev-token}
      TG_OUTREACH_DATABASE_URL: ${TG_OUTREACH_DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/tg_outreach}
      TG_OUTREACH_BUILD_VERSION: ${TG_OUTREACH_BUILD_VERSION:-dev}
      TG_OUTREACH_GIT_SHA: ${TG_OUTREACH_GIT_SHA:-unknown}
      TG_OUTREACH_PROFILE_PATH: ${TG_OUTREACH_PROFILE_PATH:-/app/config/candidate_profile.json}
      TG_OUTREACH_PREFERENCES_PATH: ${TG_OUTREACH_PREFERENCES_PATH:-/app/config/candidate_preferences.json}
      TG_OUTREACH_USER_HEADLINE: ${TG_OUTREACH_USER_HEADLINE:-Senior Python/ML engineer focused on backend systems and MLOps}
      TG_OUTREACH_USER_SKILLS: ${TG_OUTREACH_USER_SKILLS:-python,fastapi,backend,mlops,llm,infra,docker,postgresql,observability}
      TG_OUTREACH_MIN_SCORE: ${TG_OUTREACH_MIN_SCORE:-0.20}
      TG_OUTREACH_MAX_DAILY_OUTREACH: ${TG_OUTREACH_MAX_DAILY_OUTREACH:-3}
      TG_OUTREACH_ASTRIXA_TIMEOUT_SECONDS: ${TG_OUTREACH_ASTRIXA_TIMEOUT_SECONDS:-8}
      TG_OUTREACH_CONTEXT_BUDGET_TOKENS: ${TG_OUTREACH_CONTEXT_BUDGET_TOKENS:-3000}
      TG_OUTREACH_APPROVAL_TTL_SECONDS: ${TG_OUTREACH_APPROVAL_TTL_SECONDS:-86400}
      TG_OUTREACH_FOLLOW_UP_DELAY_SECONDS: ${TG_OUTREACH_FOLLOW_UP_DELAY_SECONDS:-259200}
      TG_OUTREACH_WORKER_POLL_SECONDS: ${TG_OUTREACH_WORKER_POLL_SECONDS:-15}
      TG_OUTREACH_TELEGRAM_REPLY_POLL_INTERVAL_SECONDS: ${TG_OUTREACH_TELEGRAM_REPLY_POLL_INTERVAL_SECONDS:-300}
      TG_OUTREACH_TELEGRAM_API_ID: ${TG_OUTREACH_TELEGRAM_API_ID:-}
      TG_OUTREACH_TELEGRAM_API_HASH: ${TG_OUTREACH_TELEGRAM_API_HASH:-}
      TG_OUTREACH_TELEGRAM_SESSION_STRING: ${TG_OUTREACH_TELEGRAM_SESSION_STRING:-}
      TG_OUTREACH_TELEGRAM_CHANNELS: ${TG_OUTREACH_TELEGRAM_CHANNELS:-t.me/hrlunapark,t.me/yuniorapp,t.me/dev_connectablejobs}
      TG_OUTREACH_NOTIFY_TARGET: ${TG_OUTREACH_NOTIFY_TARGET:-}
      TG_OUTREACH_DISPATCH_MODE: ${TG_OUTREACH_DISPATCH_MODE:-dry_run}
    volumes:
      - ./data/outreach-api:/data
      - ./config:/app/config:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - default
      - astrixa_net

networks:
  astrixa_net:
    external: true
    name: astrixa_default
